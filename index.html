<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dofus Craft Manager</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;900&family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-deep: #060810;
    --bg-card: #0d1117;
    --bg-panel: #111827;
    --bg-hover: #1a2333;
    --border: #1e2d45;
    --neon-gold: #f5a623;
    --neon-gold-dim: rgba(245,166,35,0.12);
    --neon-teal: #00e5ff;
    --neon-teal-dim: rgba(0,229,255,0.1);
    --text-primary: #e8e0d0;
    --text-secondary: #8a9ab5;
    --text-muted: #4a5568;
    --red: #ff4757;
    --green: #2ed573;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'Rajdhani',sans-serif; background:var(--bg-deep); color:var(--text-primary); min-height:100vh; overflow-x:hidden; }
  body::before { content:''; position:fixed; inset:0; background-image:linear-gradient(rgba(245,166,35,0.025) 1px,transparent 1px),linear-gradient(90deg,rgba(245,166,35,0.025) 1px,transparent 1px); background-size:40px 40px; pointer-events:none; z-index:0; }
  body::after { content:''; position:fixed; top:-50%;left:-50%;width:200%;height:200%; background:radial-gradient(ellipse at 25% 20%,rgba(245,166,35,0.05) 0%,transparent 50%),radial-gradient(ellipse at 75% 80%,rgba(0,229,255,0.03) 0%,transparent 50%); pointer-events:none; z-index:0; animation:driftBg 25s ease-in-out infinite alternate; }
  @keyframes driftBg { from{transform:translate(0,0)} to{transform:translate(2%,2%)} }

  header { position:relative;z-index:10;text-align:center;padding:36px 20px 28px;border-bottom:1px solid var(--border);background:linear-gradient(180deg,rgba(245,166,35,0.07) 0%,transparent 100%); }
  .logo-wrap { display:flex;align-items:center;justify-content:center;gap:14px;margin-bottom:6px; }
  .logo-hex { width:46px;height:46px;background:linear-gradient(135deg,#f5a623,#e8940f);clip-path:polygon(50% 0%,100% 25%,100% 75%,50% 100%,0% 75%,0% 25%);display:flex;align-items:center;justify-content:center;font-size:22px;box-shadow:0 0 24px rgba(245,166,35,0.6);animation:hexPulse 3s ease-in-out infinite; }
  @keyframes hexPulse { 0%,100%{box-shadow:0 0 24px rgba(245,166,35,0.5)} 50%{box-shadow:0 0 44px rgba(245,166,35,0.9),0 0 70px rgba(245,166,35,0.3)} }
  h1 { font-family:'Cinzel',serif;font-size:clamp(1.8rem,4vw,3rem);font-weight:900;letter-spacing:4px;background:linear-gradient(135deg,#f5a623 0%,#ffe082 50%,#f5a623 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text; }
  .subtitle { font-size:12px;color:var(--text-muted);letter-spacing:5px;text-transform:uppercase;margin-top:4px; }

  .tabs { display:flex;justify-content:center;gap:4px;padding:14px 20px 0;position:relative;z-index:10;border-bottom:1px solid var(--border);background:var(--bg-deep); }
  .tab-btn { font-family:'Rajdhani',sans-serif;font-weight:700;font-size:13px;letter-spacing:2px;text-transform:uppercase;padding:10px 30px;background:transparent;border:none;color:var(--text-muted);cursor:pointer;position:relative;transition:color 0.2s; }
  .tab-btn::after { content:'';position:absolute;bottom:0;left:50%;right:50%;height:2px;background:var(--neon-gold);transition:left 0.3s,right 0.3s;box-shadow:0 0 8px var(--neon-gold); }
  .tab-btn.active { color:var(--neon-gold); }
  .tab-btn.active::after { left:0;right:0; }
  .tab-btn:hover:not(.active) { color:var(--text-primary); }

  .container { max-width:1340px;margin:0 auto;padding:28px 20px;position:relative;z-index:10; }
  .tab-content { display:none; }
  .tab-content.active { display:block;animation:fadeIn 0.3s ease; }
  @keyframes fadeIn { from{opacity:0;transform:translateY(4px)} to{opacity:1;transform:none} }

  .craft-layout { display:grid;grid-template-columns:1fr 360px;gap:22px; }
  @media(max-width:920px){.craft-layout{grid-template-columns:1fr}}

  .panel { background:var(--bg-card);border:1px solid var(--border);border-radius:14px;overflow:hidden;position:relative; }
  .panel::before { content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--neon-gold),transparent); }
  .panel-header { padding:14px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:rgba(245,166,35,0.03); }
  .panel-title { font-family:'Cinzel',serif;font-size:12px;letter-spacing:2px;color:var(--neon-gold);text-transform:uppercase; }
  .panel-body { padding:18px; }

  .badge { display:inline-block;padding:2px 10px;border-radius:20px;font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase; }
  .badge-gold { background:rgba(245,166,35,0.12);color:var(--neon-gold);border:1px solid rgba(245,166,35,0.25); }
  .badge-teal { background:rgba(0,229,255,0.08);color:var(--neon-teal);border:1px solid rgba(0,229,255,0.2); }

  .search-wrap { position:relative;margin-bottom:16px; }
  .search-wrap input { width:100%;padding:11px 16px 11px 42px;background:var(--bg-panel);border:1px solid var(--border);border-radius:9px;color:var(--text-primary);font-family:'Rajdhani',sans-serif;font-size:15px;outline:none;transition:border-color 0.2s,box-shadow 0.2s; }
  .search-wrap input:focus { border-color:var(--neon-gold);box-shadow:0 0 0 3px var(--neon-gold-dim); }
  .search-icon { position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--text-muted);font-size:15px;pointer-events:none; }

  .item-grid { display:grid;grid-template-columns:repeat(auto-fill,minmax(118px,1fr));gap:10px;max-height:440px;overflow-y:auto;padding-right:4px; }
  .item-grid::-webkit-scrollbar { width:4px; }
  .item-grid::-webkit-scrollbar-thumb { background:var(--border);border-radius:2px; }

  .item-card { background:var(--bg-panel);border:1px solid var(--border);border-radius:10px;padding:12px 8px 10px;cursor:pointer;text-align:center;transition:all 0.2s;position:relative;overflow:hidden; }
  .item-card:hover { border-color:var(--neon-gold);background:var(--neon-gold-dim);transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,0.4); }
  .item-card.selected { border-color:var(--neon-teal);background:var(--neon-teal-dim);box-shadow:0 0 14px rgba(0,229,255,0.15); }
  .item-card.selected::after { content:'✓';position:absolute;top:5px;right:7px;font-size:11px;color:var(--neon-teal);font-weight:700; }

  .item-img-wrap { width:56px;height:56px;margin:0 auto 8px;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,0.3);border-radius:8px;overflow:hidden; }
  .item-img-wrap img { width:48px;height:48px;object-fit:contain;image-rendering:pixelated;transition:transform 0.2s; }
  .item-card:hover .item-img-wrap img { transform:scale(1.1); }
  .fallback-emoji { font-size:30px;line-height:1; }
  .item-name { font-size:11px;font-weight:600;color:var(--text-secondary);line-height:1.3;word-break:break-word; }

  .queue-list { display:flex;flex-direction:column;gap:8px;max-height:380px;overflow-y:auto;padding-right:4px; }
  .queue-list::-webkit-scrollbar { width:4px; }
  .queue-list::-webkit-scrollbar-thumb { background:var(--border);border-radius:2px; }

  .queue-item { display:flex;align-items:center;gap:10px;background:var(--bg-panel);border:1px solid var(--border);border-radius:9px;padding:9px 12px;animation:slideIn 0.25s ease;transition:border-color 0.2s; }
  .queue-item:hover { border-color:rgba(245,166,35,0.3); }
  @keyframes slideIn { from{opacity:0;transform:translateX(-8px)} to{opacity:1;transform:none} }

  .q-img { width:38px;height:38px;flex-shrink:0;background:rgba(0,0,0,0.3);border-radius:6px;display:flex;align-items:center;justify-content:center;overflow:hidden; }
  .q-img img { width:32px;height:32px;object-fit:contain;image-rendering:pixelated; }
  .q-img .q-emoji { font-size:22px; }
  .q-name { flex:1;font-weight:600;font-size:13px;color:var(--text-primary);line-height:1.2; }

  .qty-control { display:flex;align-items:center;gap:5px; }
  .qty-btn { width:24px;height:24px;background:var(--bg-hover);border:1px solid var(--border);border-radius:5px;color:var(--text-secondary);font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.15s;line-height:1; }
  .qty-btn:hover { border-color:var(--neon-gold);color:var(--neon-gold); }
  .qty-input { width:42px;text-align:center;background:var(--bg-deep);border:1px solid var(--border);border-radius:5px;color:var(--neon-gold);font-family:'Rajdhani',sans-serif;font-size:14px;font-weight:700;padding:2px 4px;outline:none; }
  .qty-input:focus { border-color:var(--neon-gold); }
  .remove-btn { background:none;border:none;color:var(--text-muted);cursor:pointer;font-size:15px;padding:4px;transition:color 0.15s;line-height:1;flex-shrink:0; }
  .remove-btn:hover { color:var(--red); }

  .btn { font-family:'Rajdhani',sans-serif;font-weight:700;font-size:12px;letter-spacing:2px;text-transform:uppercase;padding:10px 22px;border-radius:8px;cursor:pointer;border:none;transition:all 0.2s;display:flex;align-items:center;gap:8px; }
  .btn-primary { background:linear-gradient(135deg,#f5a623,#e8940f);color:#060810;box-shadow:0 0 20px rgba(245,166,35,0.25); }
  .btn-primary:hover { box-shadow:0 0 36px rgba(245,166,35,0.55);transform:translateY(-1px); }
  .btn-primary:disabled { opacity:0.6;transform:none;cursor:not-allowed; }
  .btn-ghost { background:transparent;border:1px solid var(--border);color:var(--text-secondary); }
  .btn-ghost:hover { border-color:var(--neon-gold);color:var(--neon-gold); }
  .btn-danger { background:transparent;border:1px solid rgba(255,71,87,0.25);color:var(--red); }
  .btn-danger:hover { background:rgba(255,71,87,0.08);border-color:var(--red); }
  .action-bar { display:flex;gap:8px;margin-top:16px;flex-wrap:wrap; }

  .resource-grid { display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:8px;margin-top:14px; }
  .resource-row { display:flex;align-items:center;gap:10px;background:var(--bg-panel);border:1px solid var(--border);border-radius:9px;padding:10px 14px;transition:border-color 0.2s;animation:fadeUp 0.35s ease both; }
  @keyframes fadeUp { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:none} }
  .resource-row:hover { border-color:rgba(245,166,35,0.25); }
  .res-img { width:40px;height:40px;flex-shrink:0;background:rgba(0,0,0,0.35);border-radius:7px;display:flex;align-items:center;justify-content:center;overflow:hidden; }
  .res-img img { width:34px;height:34px;object-fit:contain;image-rendering:pixelated; }
  .res-emoji { font-size:22px; }
  .res-info { flex:1;min-width:0; }
  .res-name { font-size:12px;color:var(--text-secondary);font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis; }
  .res-qty { font-size:20px;font-weight:700;color:var(--neon-gold);font-family:'Cinzel',serif;flex-shrink:0; }

  .empty-state { text-align:center;padding:36px 20px;color:var(--text-muted); }
  .empty-icon { font-size:44px;margin-bottom:10px;opacity:0.35; }
  .empty-state p { font-size:13px;letter-spacing:1px; }
  .glow-divider { height:1px;background:linear-gradient(90deg,transparent,var(--border),transparent);margin:16px 0; }

  /* Admin */
  .admin-layout { display:grid;grid-template-columns:1fr 1fr;gap:22px; }
  @media(max-width:820px){.admin-layout{grid-template-columns:1fr}}
  .form-group { margin-bottom:13px; }
  label { display:block;font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--text-muted);margin-bottom:5px; }
  input[type="text"],input[type="number"],select { width:100%;padding:9px 13px;background:var(--bg-panel);border:1px solid var(--border);border-radius:8px;color:var(--text-primary);font-family:'Rajdhani',sans-serif;font-size:14px;outline:none;transition:border-color 0.2s,box-shadow 0.2s; }
  input:focus,select:focus { border-color:var(--neon-gold);box-shadow:0 0 0 3px var(--neon-gold-dim); }
  select option { background:var(--bg-panel); }

  .autocomplete-wrap { position:relative; }
  .suggestions-list { position:absolute;top:100%;left:0;right:0;z-index:100;background:var(--bg-panel);border:1px solid var(--neon-gold);border-top:none;border-radius:0 0 8px 8px;max-height:220px;overflow-y:auto;box-shadow:0 8px 24px rgba(0,0,0,0.5); }
  .suggestions-list::-webkit-scrollbar { width:4px; }
  .suggestions-list::-webkit-scrollbar-thumb { background:var(--border); }
  .suggestion-item { display:flex;align-items:center;gap:10px;padding:8px 12px;cursor:pointer;transition:background 0.15s;border-bottom:1px solid rgba(255,255,255,0.04); }
  .suggestion-item:last-child { border-bottom:none; }
  .suggestion-item:hover { background:var(--neon-gold-dim); }
  .suggestion-item img { width:30px;height:30px;object-fit:contain;image-rendering:pixelated;background:rgba(0,0,0,0.3);border-radius:5px; }
  .s-name { font-size:13px;font-weight:600; }
  .s-type { font-size:10px;color:var(--text-muted);letter-spacing:1px; }

  .item-preview { display:flex;align-items:center;gap:12px;padding:10px 14px;background:var(--bg-panel);border:1px solid rgba(245,166,35,0.25);border-radius:8px;margin-bottom:13px; }
  .item-preview img { width:48px;height:48px;object-fit:contain;image-rendering:pixelated;background:rgba(0,0,0,0.3);border-radius:7px;padding:2px; }
  .prev-name { font-weight:700;font-size:14px; }
  .prev-type { font-size:11px;color:var(--text-muted);letter-spacing:1px; }

  .ingredients-builder { display:flex;flex-direction:column;gap:8px;margin-bottom:10px; }
  .ingredient-row { display:flex;gap:7px;align-items:center;animation:slideIn 0.2s ease; }
  .ing-img-preview { width:34px;height:34px;flex-shrink:0;background:rgba(0,0,0,0.3);border-radius:6px;display:flex;align-items:center;justify-content:center;overflow:hidden;border:1px solid var(--border); }
  .ing-img-preview img { width:28px;height:28px;object-fit:contain;image-rendering:pixelated; }
  .ing-emoji-fb { font-size:18px; }
  .ing-name-wrap { flex:1;position:relative; }
  .ing-name-input { width:100%;padding:7px 11px;background:var(--bg-panel);border:1px solid var(--border);border-radius:7px;color:var(--text-primary);font-family:'Rajdhani',sans-serif;font-size:13px;outline:none;transition:border-color 0.2s; }
  .ing-name-input:focus { border-color:var(--neon-gold); }
  .ing-qty { width:68px;flex-shrink:0;padding:7px 10px;background:var(--bg-panel);border:1px solid var(--border);border-radius:7px;color:var(--neon-gold);font-family:'Rajdhani',sans-serif;font-size:14px;font-weight:700;text-align:center;outline:none;transition:border-color 0.2s; }
  .ing-qty:focus { border-color:var(--neon-gold); }
  .del-ing-btn { background:none;border:1px solid rgba(255,71,87,0.3);border-radius:6px;color:var(--red);cursor:pointer;width:30px;height:30px;font-size:14px;display:flex;align-items:center;justify-content:center;transition:all 0.15s;flex-shrink:0; }
  .del-ing-btn:hover { background:rgba(255,71,87,0.1); }
  .add-ing-btn { font-family:'Rajdhani',sans-serif;font-size:12px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:var(--neon-teal);background:none;border:1px dashed rgba(0,229,255,0.25);border-radius:7px;padding:7px 14px;cursor:pointer;width:100%;transition:all 0.2s; }
  .add-ing-btn:hover { background:var(--neon-teal-dim);border-color:var(--neon-teal); }

  .ing-suggestions { position:absolute;top:100%;left:0;right:0;z-index:200;background:var(--bg-panel);border:1px solid rgba(245,166,35,0.4);border-top:none;border-radius:0 0 7px 7px;max-height:180px;overflow-y:auto;box-shadow:0 8px 20px rgba(0,0,0,0.5); }
  .ing-suggestions .suggestion-item { padding:7px 10px; }
  .ing-suggestions .suggestion-item img { width:26px;height:26px; }

  .recipe-list-admin { display:flex;flex-direction:column;gap:8px;max-height:620px;overflow-y:auto;padding-right:4px; }
  .recipe-list-admin::-webkit-scrollbar { width:4px; }
  .recipe-list-admin::-webkit-scrollbar-thumb { background:var(--border);border-radius:2px; }
  .recipe-admin-card { background:var(--bg-panel);border:1px solid var(--border);border-radius:9px;padding:11px 14px;transition:all 0.2s; }
  .recipe-admin-card:hover { border-color:rgba(245,166,35,0.3); }
  .ra-header { display:flex;align-items:center;justify-content:space-between; }
  .ra-name { display:flex;align-items:center;gap:10px;font-weight:700;font-size:14px; }
  .ra-thumb { width:36px;height:36px;background:rgba(0,0,0,0.3);border-radius:6px;display:flex;align-items:center;justify-content:center;overflow:hidden;flex-shrink:0; }
  .ra-thumb img { width:30px;height:30px;object-fit:contain;image-rendering:pixelated; }
  .ra-actions { display:flex;gap:4px; }
  .icon-btn { background:none;border:none;cursor:pointer;font-size:14px;padding:5px 7px;border-radius:5px;transition:all 0.15s;color:var(--text-muted); }
  .icon-btn:hover { background:var(--bg-hover); }
  .icon-btn.del:hover { color:var(--red); }
  .icon-btn.edit-b:hover { color:var(--neon-gold); }
  .ra-sub { font-size:11px;color:var(--text-muted);letter-spacing:1px;margin-top:3px; }

  .spinner { display:inline-block;width:14px;height:14px;border:2px solid rgba(245,166,35,0.2);border-top-color:var(--neon-gold);border-radius:50%;animation:spin 0.7s linear infinite;vertical-align:middle; }
  @keyframes spin { to{transform:rotate(360deg)} }

  #toast { position:fixed;bottom:28px;right:28px;z-index:9999;display:flex;flex-direction:column;gap:8px; }
  .toast-msg { background:var(--bg-panel);border:1px solid var(--neon-gold);border-left:4px solid var(--neon-gold);border-radius:9px;padding:11px 18px;font-size:13px;font-weight:600;color:var(--text-primary);box-shadow:0 4px 28px rgba(0,0,0,0.6);animation:toastIn 0.3s ease,toastOut 0.3s ease 2.5s both;min-width:210px;letter-spacing:.5px; }
  .toast-msg.error { border-color:var(--red);border-left-color:var(--red); }
  @keyframes toastIn { from{opacity:0;transform:translateY(10px) scale(.96)} to{opacity:1;transform:none} }
  @keyframes toastOut { to{opacity:0;transform:translateY(6px)} }
</style>
</head>
<body>

<header>
  <div class="logo-wrap">
    <div class="logo-hex">⚗️</div>
    <h1>Craft Manager</h1>
  </div>
  <p class="subtitle">Dofus · Gestionnaire de Recettes</p>
</header>

<div class="tabs">
  <button class="tab-btn active" data-tab="craft">⚔️ &nbsp;Craft</button>
  <button class="tab-btn" data-tab="admin">⚙️ &nbsp;Admin</button>
</div>

<div class="container">

  <!-- CRAFT TAB -->
  <div id="tab-craft" class="tab-content active">
    <div class="craft-layout">
      <div>
        <div class="panel">
          <div class="panel-header">
            <span class="panel-title">📦 Items Craftables</span>
            <span class="badge badge-gold" id="item-count">0 recettes</span>
          </div>
          <div class="panel-body">
            <div class="search-wrap">
              <span class="search-icon">🔍</span>
              <input type="text" id="item-search" placeholder="Rechercher un item...">
            </div>
            <div class="item-grid" id="item-grid"></div>
          </div>
        </div>

        <div class="panel" style="margin-top:22px;">
          <div class="panel-header">
            <span class="panel-title">🧮 Ressources Nécessaires</span>
            <span class="badge badge-teal" id="res-count">0 ressource</span>
          </div>
          <div class="panel-body">
            <div id="resource-output">
              <div class="empty-state"><div class="empty-icon">🪄</div><p>Sélectionne des items et clique sur Calculer</p></div>
            </div>
          </div>
        </div>
      </div>

      <div>
        <div class="panel" style="position:sticky;top:20px;">
          <div class="panel-header">
            <span class="panel-title">🛒 File de Craft</span>
            <span class="badge badge-teal" id="queue-count">0</span>
          </div>
          <div class="panel-body">
            <div class="queue-list" id="queue-list">
              <div class="empty-state"><div class="empty-icon">🎒</div><p>Clique sur un item pour l'ajouter</p></div>
            </div>
            <div class="glow-divider"></div>
            <div style="display:flex;flex-direction:column;gap:8px;">
              <button class="btn btn-primary" id="calc-btn" style="width:100%;justify-content:center;" onclick="calculate()">⚗️ &nbsp;Calculer les ressources</button>
              <button class="btn btn-danger" style="width:100%;justify-content:center;" onclick="clearQueue()">🗑️ &nbsp;Vider la file</button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- ADMIN TAB -->
  <div id="tab-admin" class="tab-content">
    <div class="admin-layout">
      <div class="panel">
        <div class="panel-header">
          <span class="panel-title" id="form-title">➕ Nouvelle Recette</span>
        </div>
        <div class="panel-body">
          <div class="form-group">
            <label>Item principal — recherche DofusDB</label>
            <div class="autocomplete-wrap">
              <input type="text" id="f-main-search" placeholder="ex: Cature, Amulette du Bouftou..." autocomplete="off">
              <div class="suggestions-list" id="main-suggestions" style="display:none;"></div>
            </div>
          </div>

          <div id="item-preview-wrap" style="display:none;" class="item-preview">
            <img id="prev-img" src="" alt="">
            <div>
              <div class="prev-name" id="prev-name"></div>
              <div class="prev-type" id="prev-type"></div>
            </div>
          </div>

          <input type="hidden" id="f-id">
          <input type="hidden" id="f-name">
          <input type="hidden" id="f-img">
          <input type="hidden" id="f-type">

          <div class="form-group">
            <label>Ingrédients (recherche automatique d'icônes)</label>
            <div class="ingredients-builder" id="ing-builder"></div>
            <button class="add-ing-btn" onclick="addIngRow()">+ Ajouter un ingrédient</button>
          </div>

          <div class="action-bar" style="margin-top:4px;">
            <button class="btn btn-primary" onclick="saveRecipe()">💾 &nbsp;Sauvegarder</button>
            <button class="btn btn-ghost" onclick="resetForm()">✖️ &nbsp;Annuler</button>
          </div>
        </div>
      </div>

      <div class="panel">
        <div class="panel-header">
          <span class="panel-title">📜 Recettes enregistrées</span>
          <span class="badge badge-gold" id="admin-count">0</span>
        </div>
        <div class="panel-body">
          <div class="recipe-list-admin" id="recipe-list-admin"></div>
        </div>
      </div>
    </div>
  </div>

</div>

<div id="toast"></div>

<script>
// ══ CONFIG ══
const API = 'https://api.dofusdb.fr';
const cache = new Map();

// ══ DATA ══
const DEFAULT_RECIPES = [{
  id:'cature_v1', name:'Cature',
  img:'https://api.dofusdb.fr/img/items/9004.png',
  type:'Équipement',
  ingredients:[
    {name:'Parchemin de Cactana',qty:26,img:''},
    {name:'String de Pampactus',qty:26,img:''},
    {name:'Jus de Cacterre',qty:7,img:''},
    {name:'Koinkoin de bain de Nagate',qty:4,img:''},
    {name:'Duvet du Maître Corbac',qty:3,img:''},
    {name:'Trame Dimensionnelle',qty:3,img:''},
    {name:'Substrat de Forêt',qty:1,img:''},
    {name:"Étoile d'Or d'El Piko",qty:1,img:''},
  ]
}];

function load() {
  try { const s=localStorage.getItem('dofus_craft_v3'); if(s) return JSON.parse(s); } catch(e){}
  return [...DEFAULT_RECIPES];
}
function persist() { localStorage.setItem('dofus_craft_v3', JSON.stringify(recipes)); }

let recipes = load();
let queue = []; // [{id,qty}]
let editingId = null;

// ══ API ══
function imgUrl(raw) {
  if (!raw) return '';
  return raw.startsWith('http') ? raw : `${API}${raw}`;
}

function normalize(item) {
  return {
    id: item.id,
    name: item.name?.fr || item.name || '',
    img: imgUrl(item.img || ''),
    type: item.type?.name?.fr || item.type?.fr || '',
  };
}

async function searchApi(endpoint, q, limit=7) {
  const key = `${endpoint}|${q}`;
  if (cache.has(key)) return cache.get(key);
  try {
    const r = await fetch(`${API}/${endpoint}?name[$search]=${encodeURIComponent(q)}&lang=fr&$limit=${limit}`);
    if (!r.ok) return [];
    const d = await r.json();
    const res = (d.data||[]).map(normalize);
    cache.set(key, res);
    return res;
  } catch(e) { return []; }
}

async function searchItem(q, limit=8) {
  // Search both items and resources, merge results
  const [items, resources] = await Promise.all([
    searchApi('items', q, limit),
    searchApi('resources', q, Math.ceil(limit/2))
  ]);
  const seen = new Set();
  return [...items, ...resources].filter(x => { if(seen.has(x.id)) return false; seen.add(x.id); return true; });
}

async function searchResource(q) {
  return await searchApi('resources', q, 6);
}

async function resolveImg(name) {
  const key = 'ri|'+name;
  if (cache.has(key)) return cache.get(key);
  const results = await searchResource(name);
  const match = results.find(r => r.name.toLowerCase() === name.toLowerCase()) || results[0];
  const img = match?.img || '';
  cache.set(key, img);
  return img;
}

// ══ TABS ══
document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    const tab = btn.dataset.tab;
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('tab-'+tab).classList.add('active');
    if (tab==='admin') { renderAdminList(); }
  });
});

// ══ CRAFT ══
function renderItemGrid() {
  const q = document.getElementById('item-search').value.toLowerCase();
  const grid = document.getElementById('item-grid');
  const filtered = recipes.filter(r => r.name.toLowerCase().includes(q));
  document.getElementById('item-count').textContent = recipes.length+' recette'+(recipes.length!==1?'s':'');

  if (!filtered.length) {
    grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1"><div class="empty-icon">🔍</div><p>Aucun item trouvé</p></div>`;
    return;
  }

  grid.innerHTML = filtered.map(r => {
    const inQ = queue.find(q=>q.id===r.id);
    return `<div class="item-card ${inQ?'selected':''}" onclick="toggleItem('${r.id}')">
      <div class="item-img-wrap">
        ${r.img?`<img src="${r.img}" alt="${r.name}" onerror="this.style.display='none';this.nextSibling.style.display='block'">`:``}
        <span class="fallback-emoji" style="${r.img?'display:none':''}">📦</span>
      </div>
      <div class="item-name">${r.name}</div>
      ${inQ?`<div style="margin-top:5px"><span class="badge badge-teal">×${inQ.qty}</span></div>`:''}
    </div>`;
  }).join('');
}

document.getElementById('item-search').addEventListener('input', renderItemGrid);

function toggleItem(id) {
  const idx = queue.findIndex(q=>q.id===id);
  if (idx>=0) queue.splice(idx,1);
  else queue.push({id,qty:1});
  renderItemGrid(); renderQueue();
}

function renderQueue() {
  const list = document.getElementById('queue-list');
  document.getElementById('queue-count').textContent = queue.length;
  if (!queue.length) {
    list.innerHTML = `<div class="empty-state"><div class="empty-icon">🎒</div><p>Clique sur un item pour l'ajouter</p></div>`;
    return;
  }
  list.innerHTML = queue.map((q,i) => {
    const r = recipes.find(x=>x.id===q.id);
    if(!r) return '';
    const img = r.img?`<img src="${r.img}" onerror="this.parentElement.innerHTML='<span class=q-emoji>📦</span>'">`:`<span class="q-emoji">📦</span>`;
    return `<div class="queue-item">
      <div class="q-img">${img}</div>
      <div class="q-name">${r.name}</div>
      <div class="qty-control">
        <button class="qty-btn" onclick="chQty(${i},-1)">−</button>
        <input class="qty-input" type="number" min="1" value="${q.qty}" onchange="setQty(${i},this.value)">
        <button class="qty-btn" onclick="chQty(${i},1)">+</button>
      </div>
      <button class="remove-btn" onclick="rmQueue(${i})">✕</button>
    </div>`;
  }).join('');
}

function chQty(i,d){queue[i].qty=Math.max(1,(queue[i].qty||1)+d);renderQueue();renderItemGrid();}
function setQty(i,v){queue[i].qty=Math.max(1,parseInt(v)||1);renderItemGrid();}
function rmQueue(i){queue.splice(i,1);renderQueue();renderItemGrid();}

function clearQueue(){
  queue=[];renderQueue();renderItemGrid();
  document.getElementById('resource-output').innerHTML=`<div class="empty-state"><div class="empty-icon">🪄</div><p>Sélectionne des items et clique sur Calculer</p></div>`;
  document.getElementById('res-count').textContent='0 ressource';
}

async function calculate() {
  if (!queue.length){showToast('Aucun item dans la file !',true);return;}
  const btn=document.getElementById('calc-btn');
  btn.innerHTML=`<span class="spinner"></span> &nbsp;Calcul en cours...`;
  btn.disabled=true;

  // Aggregate
  const totals={}; // name -> {qty, img}
  for (const q of queue) {
    const r=recipes.find(x=>x.id===q.id);
    if(!r) continue;
    for(const ing of r.ingredients){
      if(!totals[ing.name]) totals[ing.name]={qty:0,img:ing.img||''};
      totals[ing.name].qty+=ing.qty*q.qty;
    }
  }

  // Resolve missing images in parallel
  await Promise.all(Object.entries(totals).map(async([name,data])=>{
    if(!data.img) data.img=await resolveImg(name);
  }));

  const entries=Object.entries(totals).sort((a,b)=>b[1].qty-a[1].qty);
  document.getElementById('res-count').textContent=entries.length+' ressource'+(entries.length!==1?'s':'');

  document.getElementById('resource-output').innerHTML=`
    <div class="resource-grid">
      ${entries.map(([name,{qty,img}],i)=>`
        <div class="resource-row" style="animation-delay:${i*0.03}s">
          <div class="res-img">
            ${img?`<img src="${img}" alt="${name}" onerror="this.style.display='none';this.nextSibling.style.display='block'">`:''}
            <span class="res-emoji" style="${img?'display:none':''}">📦</span>
          </div>
          <div class="res-info"><div class="res-name">${name}</div></div>
          <div class="res-qty">×${qty}</div>
        </div>`).join('')}
    </div>
    <div class="action-bar" style="margin-top:16px;">
      <button class="btn btn-ghost" onclick="exportCSV()">📊 &nbsp;Excel</button>
      <button class="btn btn-ghost" onclick="copyRes()">📋 &nbsp;Copier</button>
    </div>`;

  btn.innerHTML=`⚗️ &nbsp;Calculer les ressources`;
  btn.disabled=false;
  showToast(`✅ ${entries.length} ressource(s) calculée(s) !`);
}

function getTotals(){
  const t={};
  for(const q of queue){const r=recipes.find(x=>x.id===q.id);if(!r)continue;for(const i of r.ingredients){t[i.name]=(t[i.name]||0)+i.qty*q.qty;}}
  return t;
}

function exportCSV(){
  const t=getTotals();
  const rows=[['Ressource','Quantité'],...Object.entries(t).sort((a,b)=>b[1]-a[1])];
  const blob=new Blob(['\ufeff'+rows.map(r=>r.join(';')).join('\n')],{type:'text/csv;charset=utf-8;'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='craft_dofus.csv';a.click();
  showToast('📊 Export téléchargé !');
}

function copyRes(){
  const t=getTotals();
  navigator.clipboard.writeText(Object.entries(t).sort((a,b)=>b[1]-a[1]).map(([n,q])=>`${q}x ${n}`).join('\n'))
    .then(()=>showToast('📋 Copié !'));
}

// ══ ADMIN ══
// Main item autocomplete
let mainTimer=null;
const mainInput=document.getElementById('f-main-search');
const mainSugg=document.getElementById('main-suggestions');

mainInput.addEventListener('input',()=>{
  clearTimeout(mainTimer);
  const q=mainInput.value.trim();
  if(q.length<2){mainSugg.style.display='none';return;}
  mainTimer=setTimeout(async()=>{
    mainSugg.innerHTML=`<div class="suggestion-item"><span class="spinner"></span> &nbsp;Recherche...</div>`;
    mainSugg.style.display='block';
    const results=await searchItem(q,8);
    if(!results.length){mainSugg.innerHTML=`<div class="suggestion-item" style="color:var(--text-muted)">Aucun résultat</div>`;return;}
    mainSugg.innerHTML=results.map(item=>`
      <div class="suggestion-item" onclick='selectMain(${JSON.stringify(item)})'>
        ${item.img?`<img src="${item.img}" onerror="this.src=''">`:`<span>📦</span>`}
        <div><div class="s-name">${item.name}</div><div class="s-type">${item.type}</div></div>
      </div>`).join('');
  },350);
});
mainInput.addEventListener('blur',()=>setTimeout(()=>{mainSugg.style.display='none';},200));

function selectMain(item){
  document.getElementById('f-id').value=item.id;
  document.getElementById('f-name').value=item.name;
  document.getElementById('f-img').value=item.img;
  document.getElementById('f-type').value=item.type;
  mainInput.value=item.name;
  mainSugg.style.display='none';
  document.getElementById('prev-img').src=item.img||'';
  document.getElementById('prev-name').textContent=item.name;
  document.getElementById('prev-type').textContent=item.type||'';
  document.getElementById('item-preview-wrap').style.display=item.name?'flex':'none';
}

function addIngRow(name='',qty='',img=''){
  const builder=document.getElementById('ing-builder');
  const row=document.createElement('div');
  row.className='ingredient-row';
  row.dataset.img=img;
  row.innerHTML=`
    <div class="ing-img-preview">
      ${img?`<img src="${img}" onerror="this.style.display='none'">`:`<span class="ing-emoji-fb">📦</span>`}
    </div>
    <div class="ing-name-wrap">
      <input class="ing-name-input" type="text" placeholder="Nom de la ressource" value="${name}" autocomplete="off">
      <div class="ing-suggestions" style="display:none;"></div>
    </div>
    <input class="ing-qty" type="number" min="1" placeholder="Qté" value="${qty}">
    <button class="del-ing-btn" onclick="this.closest('.ingredient-row').remove()">✕</button>`;
  builder.appendChild(row);

  const ni=row.querySelector('.ing-name-input');
  const preview=row.querySelector('.ing-img-preview');
  const sb=row.querySelector('.ing-suggestions');
  let t=null;

  ni.addEventListener('input',()=>{
    clearTimeout(t);
    const q=ni.value.trim();
    if(q.length<2){sb.style.display='none';return;}
    t=setTimeout(async()=>{
      sb.innerHTML=`<div class="suggestion-item"><span class="spinner"></span></div>`;
      sb.style.display='block';
      const res=await searchResource(q);
      if(!res.length){sb.style.display='none';return;}
      sb.innerHTML=res.map(item=>`
        <div class="suggestion-item" data-img="${item.img}" data-name="${item.name.replace(/"/g,'&quot;')}">
          ${item.img?`<img src="${item.img}" onerror="this.src=''">`:`<span>📦</span>`}
          <div class="s-name">${item.name}</div>
        </div>`).join('');
      sb.querySelectorAll('.suggestion-item').forEach(el=>{
        el.addEventListener('mousedown',(e)=>{
          e.preventDefault();
          const img=el.dataset.img||'';
          const n=el.dataset.name||'';
          ni.value=n;
          row.dataset.img=img;
          preview.innerHTML=img?`<img src="${img}" onerror="this.style.display='none'">`:`<span class="ing-emoji-fb">📦</span>`;
          sb.style.display='none';
        });
      });
    },350);
  });
  ni.addEventListener('blur',()=>setTimeout(()=>{sb.style.display='none';},200));
}

function resetForm(){
  editingId=null;
  document.getElementById('form-title').textContent='➕ Nouvelle Recette';
  mainInput.value='';
  ['f-id','f-name','f-img','f-type'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('item-preview-wrap').style.display='none';
  document.getElementById('ing-builder').innerHTML='';
  addIngRow();
}

function editRecipe(id){
  const r=recipes.find(x=>x.id===id);if(!r)return;
  editingId=id;
  document.getElementById('form-title').textContent='✏️ Modifier – '+r.name;
  mainInput.value=r.name;
  document.getElementById('f-id').value=r.id;
  document.getElementById('f-name').value=r.name;
  document.getElementById('f-img').value=r.img||'';
  document.getElementById('f-type').value=r.type||'';
  if(r.img){document.getElementById('prev-img').src=r.img;document.getElementById('prev-name').textContent=r.name;document.getElementById('prev-type').textContent=r.type||'';document.getElementById('item-preview-wrap').style.display='flex';}
  document.getElementById('ing-builder').innerHTML='';
  r.ingredients.forEach(i=>addIngRow(i.name,i.qty,i.img||''));
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(t=>t.classList.remove('active'));
  document.querySelector('[data-tab="admin"]').classList.add('active');
  document.getElementById('tab-admin').classList.add('active');
  renderAdminList();
  window.scrollTo({top:0,behavior:'smooth'});
}

function deleteRecipe(id){
  const r=recipes.find(x=>x.id===id);
  if(!r||!confirm(`Supprimer "${r.name}" ?`))return;
  recipes=recipes.filter(x=>x.id!==id);
  queue=queue.filter(q=>q.id!==id);
  persist();renderAdminList();renderItemGrid();renderQueue();
  showToast('🗑️ Supprimée');
}

function saveRecipe(){
  const name=document.getElementById('f-name').value.trim();
  const img=document.getElementById('f-img').value.trim();
  const type=document.getElementById('f-type').value.trim();
  if(!name){showToast('Sélectionne un item principal !',true);return;}
  const rows=document.querySelectorAll('#ing-builder .ingredient-row');
  const ingredients=[];
  for(const row of rows){
    const n=row.querySelector('.ing-name-input').value.trim();
    const q=parseInt(row.querySelector('.ing-qty').value);
    const i=row.dataset.img||'';
    if(n&&q>0)ingredients.push({name:n,qty:q,img:i});
  }
  if(!ingredients.length){showToast('Ajoute au moins un ingrédient !',true);return;}
  if(editingId){
    const idx=recipes.findIndex(r=>r.id===editingId);
    if(idx>=0)recipes[idx]={...recipes[idx],name,img,type,ingredients};
    showToast('✅ Recette mise à jour !');
  } else {
    recipes.push({id:'r_'+Date.now(),name,img,type,ingredients});
    showToast('✅ Recette ajoutée !');
  }
  persist();renderAdminList();renderItemGrid();renderQueue();resetForm();
}

function renderAdminList(){
  const list=document.getElementById('recipe-list-admin');
  document.getElementById('admin-count').textContent=recipes.length;
  if(!recipes.length){list.innerHTML=`<div class="empty-state"><div class="empty-icon">📜</div><p>Aucune recette</p></div>`;return;}
  list.innerHTML=recipes.map(r=>`
    <div class="recipe-admin-card">
      <div class="ra-header">
        <div class="ra-name">
          <div class="ra-thumb">${r.img?`<img src="${r.img}" onerror="this.parentElement.textContent='📦'">`:'📦'}</div>
          <div><div>${r.name}</div>${r.type?`<div class="ra-sub">${r.type}</div>`:''}</div>
        </div>
        <div class="ra-actions">
          <button class="icon-btn edit-b" onclick="editRecipe('${r.id}')">✏️</button>
          <button class="icon-btn del" onclick="deleteRecipe('${r.id}')">🗑️</button>
        </div>
      </div>
      <div class="ra-sub" style="margin-top:5px;">${r.ingredients.length} ingrédient(s)</div>
    </div>`).join('');
}

// ══ TOAST ══
function showToast(msg,err=false){
  const t=document.getElementById('toast');
  const el=document.createElement('div');
  el.className='toast-msg'+(err?' error':'');
  el.textContent=msg;
  t.appendChild(el);
  setTimeout(()=>el.remove(),2900);
}

// ══ INIT ══
renderItemGrid();
renderQueue();
</script>
</body>
</html>
